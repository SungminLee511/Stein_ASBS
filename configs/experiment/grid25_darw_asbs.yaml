# @package _global_

defaults:
  - /problem: grid25
  - /source: gauss
  - /sde@ref_sde: ve
  - /model@controller: fouriermlp
  - /state_cost: zero
  - /term_cost: score_term_cost
  - /matcher@adjoint_matcher: ksd_darw_adjoint_ve

exp_name: grid25_darw_asbs

# === source ===
scale: 0.5

# === sde ===
nfe: 100
sigma_max: 6
sigma_min: 0.01
rescale_t: null

# === KSD parameters ===
ksd_lambda: 1.0
darw_beta: 0.5

# === training ===
num_epochs: 3000
max_grad_E_norm: 50

adjoint_matcher:
  buffer_size: 10000
  duplicates: 10
  resample_size: 1000
  num_epochs_per_stage: ${num_epochs}
  optim:
    lr: 1e-3
    weight_decay: 0

# === eval & logging ===
use_wandb: false
skip_eval: true
eval_freq: 200
