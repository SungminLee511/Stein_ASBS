# @package _global_
# KSD-only ASBS: adjoint terminal cost = pure KSD (no energy gradient).
# No corrector. Pure adjoint stage only.
# Equivalent to λ=∞ in the KSD-ASBS formulation.

defaults:
  - /problem: lj13
  - /source: harmonic
  - /sde@ref_sde: graph_ve
  - /model@controller: egnn
  - /state_cost: zero
  - /term_cost: zero_term_cost
  - /matcher@adjoint_matcher: ksd_adjoint_ve

exp_name: lj13_ksd_only_asbs

# === source ===
scale: 2

# === sde ===
nfe: 1000
sigma_max: 1
sigma_min: 0.001
rescale_t: null

# === KSD parameters ===
ksd_lambda: 0.1  # Smaller lambda to prevent blowup (only term, so scale matters)

# === training ===
num_epochs: 5000
max_grad_E_norm: 100
clip_grad_norm: true

adjoint_matcher:
  buffer_size: 10000
  duplicates: 25
  resample_size: 1000
  num_epochs_per_stage: ${num_epochs}
  optim:
    lr: 1e-4
    weight_decay: 0

# === eval & logging ===
use_wandb: false
eval_freq: 50
