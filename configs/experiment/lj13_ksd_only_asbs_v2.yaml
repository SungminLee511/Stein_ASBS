# @package _global_
# LJ13 KSD-only ASBS v2: gradient clipping + smaller lambda
# Changes from v1: clip_grad_norm=1.0, ksd_lambda=0.01

defaults:
  - /problem: lj13
  - /source: delta
  - /sde@ref_sde: graph_ve
  - /model@controller: egnn
  - /state_cost: zero
  - /term_cost: graph_score_term_cost
  - /matcher@adjoint_matcher: ksd_adjoint_ve

exp_name: lj13_ksd_only_asbs_v2

# === sde ===
nfe: 1000
sigma_max: 2
sigma_min: 0.001
rescale_t: null

# === KSD parameters ===
ksd_lambda: 0.01

# === training ===
num_epochs: 5000
max_grad_E_norm: 100
clip_grad_norm: 1.0

adjoint_matcher:
  buffer_size: 10000
  duplicates: 25
  resample_size: 1000
  num_epochs_per_stage: ${num_epochs}
  optim:
    lr: 1e-4
    weight_decay: 0

# === eval & logging ===
use_wandb: false
eval_freq: 50
