# @package _global_

defaults:
  - /problem: manywell32
  - /source: gauss
  - /sde@ref_sde: ve
  - /model@controller: fouriermlp
  - /state_cost: zero
  - /term_cost: score_term_cost
  - /matcher@adjoint_matcher: ksd_adjoint_ve

exp_name: manywell32_ksd_asbs

# === source ===
scale: 2

# === sde ===
nfe: 200
sigma_max: 3
sigma_min: 0.001
rescale_t: null

# === KSD parameters ===
ksd_lambda: 1.0

# === training ===
num_epochs: 5000
max_grad_E_norm: 100

adjoint_matcher:
  buffer_size: 10000
  duplicates: 10
  resample_size: 1000
  num_epochs_per_stage: ${num_epochs}
  optim:
    lr: 1e-3
    weight_decay: 0

# === eval & logging ===
use_wandb: false
eval_freq: 200
