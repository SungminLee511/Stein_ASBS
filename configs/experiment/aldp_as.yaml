# @package _global_

defaults:
  - /problem: aldp
  - /source: gauss
  - /sde@ref_sde: ve
  - /model@controller: fouriermlp
  - /state_cost: zero
  - /term_cost: score_term_cost
  - /matcher@adjoint_matcher: adjoint_ve

exp_name: aldp_as

# === source ===
scale: 0.1

# === sde ===
nfe: 200
sigma_max: 0.1
sigma_min: 0.001
rescale_t: null

# === training ===
num_epochs: 5000
max_grad_E_norm: 100

adjoint_matcher:
  buffer_size: 10000
  duplicates: 10
  resample_size: 500
  num_epochs_per_stage: ${num_epochs}
  optim:
    lr: 1e-4
    weight_decay: 0

# === eval & logging ===
use_wandb: false
eval_freq: 200
